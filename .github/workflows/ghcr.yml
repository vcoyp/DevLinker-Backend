name: Publish and Deploy Docker Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vcoyp/devlinker-backend
  AWS_REGION: ap-northeast-2
  EC2_INSTANCE_ID: i-04f39d1115721ddc2

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/vcoyp/devlinker-backend:latest
            ghcr.io/vcoyp/devlinker-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::253906287036:role/DevLinker-GitHub-CD-Role
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-DevLinker-CD

      - name: Deploy to EC2 with SSM
        shell: bash
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

          cat > ssm-parameters.json <<EOF
          {
            "commands": [
              "set -eu",
              "IMAGE='$IMAGE'",
              "docker pull \$IMAGE",
              "docker rm -f devlinker-backend 2>/dev/null || true",
              "docker run -d --name devlinker-backend --restart unless-stopped --env-file /etc/devlinker/devlinker.env -p 8082:8082 \$IMAGE",
              "i=0; until curl -fsS http://localhost:8082/actuator/health; do i=\$((i+1)); if [ \$i -ge 24 ]; then docker logs --tail 120 devlinker-backend; exit 1; fi; sleep 5; done",
              "docker ps --filter name=devlinker-backend"
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy DevLinker backend ${{ github.sha }}" \
            --timeout-seconds 240 \
            --parameters file://ssm-parameters.json \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command ID: $COMMAND_ID"

          STATUS=""
          for attempt in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ env.EC2_INSTANCE_ID }}" \
              --query "Status" \
              --output text 2>/dev/null || true)

            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut)
                break
                ;;
            esac

            sleep 5
          done

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" \
            --query "{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}" \
            --output json || true

          if [ "$STATUS" != "Success" ]; then
            echo "EC2 deployment failed: $STATUS"
            exit 1
          fi

          echo "EC2 deployment succeeded"